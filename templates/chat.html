{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="bg-white rounded-3 shadow-sm" style="height:80vh; display:flex; flex-direction:column;">
                
                <!-- Chat Header -->
                <div class="p-3 border-bottom d-flex align-items-center">
                    <a href="/inbox" class="btn btn-sm btn-outline-secondary me-3">←</a>
                    <div style="width:40px; height:40px; background:#2874f0; border-radius:50%; display:flex; align-items:center; justify-content:center;">
                        <i class="fas fa-user text-white"></i>
                    </div>
                    <div class="ms-2">
                        <p class="fw-bold mb-0">{{ other_user.name }}</p>
                        <p class="text-muted small mb-0">{{ other_user.college }}</p>
                    </div>
                </div>

                <!-- Messages -->
                <div id="messages" style="flex:1; overflow-y:auto; padding:20px;">
                    {% for msg in messages %}
                    <div class="d-flex {% if msg.sender_id == my_id %}justify-content-end{% endif %} mb-2">
                        <div style="max-width:70%; padding:10px 15px; border-radius:{% if msg.sender_id == my_id %}18px 18px 4px 18px{% else %}18px 18px 18px 4px{% endif %}; background:{% if msg.sender_id == my_id %}#2874f0{% else %}#f0f0f0{% endif %}; color:{% if msg.sender_id == my_id %}white{% else %}#212121{% endif %};">
                            <p class="mb-1">{{ msg.content }}</p>
                            <p class="mb-0" style="font-size:0.7rem; opacity:0.7;">{{ msg.timestamp.strftime('%H:%M') }}</p>
                        </div>
                    </div>
                    {% endfor %}
                </div>

                <!-- Input -->
                <div class="p-3 border-top">
                    <div class="d-flex gap-2">
                        <input type="text" id="messageInput" class="form-control" placeholder="Type a message..." autocomplete="off">
                        <button onclick="sendMessage()" class="btn btn-primary px-4">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
<script>
    const socket = io();
    const myId = {{ my_id }};
    const receiverId = {{ other_user.id }};

    // Join room
    socket.emit('join', { receiver_id: receiverId });

    // Scroll to bottom
    const messagesDiv = document.getElementById('messages');
    messagesDiv.scrollTop = messagesDiv.scrollHeight;

    // Send message
    function sendMessage() {
        const input = document.getElementById('messageInput');
        const content = input.value.trim();
        if (!content) return;
        socket.emit('send_message', { receiver_id: receiverId, content: content });
        input.value = '';
    }

    // Enter key
    document.getElementById('messageInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') sendMessage();
    });

    // Receive message
    socket.on('receive_message', function(data) {
        const messagesDiv = document.getElementById('messages');
        const isMe = data.sender_id === myId;
        const div = document.createElement('div');
        div.className = `d-flex ${isMe ? 'justify-content-end' : ''} mb-2`;
        div.innerHTML = `
            <div style="max-width:70%; padding:10px 15px; border-radius:${isMe ? '18px 18px 4px 18px' : '18px 18px 18px 4px'}; background:${isMe ? '#2874f0' : '#f0f0f0'}; color:${isMe ? 'white' : '#212121'};">
                <p class="mb-1">${data.content}</p>
                <p class="mb-0" style="font-size:0.7rem; opacity:0.7;">${data.timestamp}</p>
            </div>`;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });
</script>
{% endblock %}
