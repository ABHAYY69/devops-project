{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="form-card">
                <h3 class="fw-bold mb-1">Create Account</h3>
                <p class="text-muted mb-4">Join CampusBazaar today!</p>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-500">Full Name</label>
                        <input type="text" name="name" class="form-control" placeholder="Your full name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" placeholder="college@email.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Min 6 characters" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">College Name</label>
                        <input type="text" name="college" class="form-control" placeholder="Your college name" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">Create Account</button>
                </form>
                <p class="text-center mt-3 text-muted">Already have an account? <a href="/login" class="text-primary fw-bold">Login</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
