
{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="form-card">
                <h3 class="fw-bold mb-1">Welcome Back!</h3>
                <p class="text-muted mb-4">Login to your CampusBazaar account</p>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" placeholder="college@email.com" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Your password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">Login</button>
                </form>
                <p class="text-center mt-3 text-muted">New here? <a href="/register" class="text-primary fw-bold">Create Account</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
