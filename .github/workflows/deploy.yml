name: Deploy to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 756269935915.dkr.ecr.ap-south-1.amazonaws.com

    - name: Build and push Docker image
      run: |
        docker build -t devops-app .
        docker tag devops-app:latest 756269935915.dkr.ecr.ap-south-1.amazonaws.com/devops-app:latest
        docker push 756269935915.dkr.ecr.ap-south-1.amazonaws.com/devops-app:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 756269935915.dkr.ecr.ap-south-1.amazonaws.com
          docker pull 756269935915.dkr.ecr.ap-south-1.amazonaws.com/devops-app:latest
          docker stop devops-app || true
          docker rm devops-app || true
          docker run -d --name devops-app -p 5000:5000 --env-file ~/myenv.env 756269935915.dkr.ecr.ap-south-1.amazonaws.com/devops-app:latesttgy